<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glyph Walkie Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0c;
            --border: #222225;
            --border-dotted: #3a3a3e;
            --accent-red: #ff3333;
            --accent-red-glow: rgba(255, 51, 51, 0.3);
            --text-white: #ffffff;
            --text-muted: #7d7d82;
            --led-dim: #18181b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            /* Nothing OS signature dot grid background */
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-white);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* LED Grid Component (13x13) */
        .matrix-container {
            width: 182px;
            height: 182px;
            background: #000000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .led-matrix {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        .led-matrix .dot {
            width: 8px;
            height: 8px;
            background-color: var(--led-dim);
            border-radius: 50%;
            transition: background-color 0.1s ease, box-shadow 0.1s ease;
        }

        .led-matrix .dot.active {
            background-color: var(--text-white);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        .led-matrix .dot.active-red {
            background-color: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
        }

        /* Typography */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        /* Dotted Separator */
        .divider {
            width: 100%;
            border-bottom: 1px dotted var(--border-dotted);
            margin-bottom: 24px;
        }

        /* Connection status chip */
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #000000;
            padding: 6px 12px;
            margin-bottom: 28px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-red);
            box-shadow: 0 0 6px var(--accent-red);
            animation: blink 1s infinite steps(2);
        }

        .peer-name {
            color: var(--text-white);
            font-weight: 700;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s ease;
            border-radius: 4px;
        }

        .btn-primary {
            background-color: var(--text-white);
            color: #000000;
            border: 1px solid var(--text-white);
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background-color: #e0e0e0;
            border-color: #e0e0e0;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-white);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: #121214;
            border-color: #3f3f46;
        }

        .footer {
            margin-top: 28px;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- LED Matrix Grid -->
        <div class="matrix-container">
            <div class="led-matrix" id="led-matrix"></div>
        </div>

        <h1>Glyph Walkie</h1>
        <p class="subtitle" id="status-message">AOD LED Waveform active...</p>

        <div class="divider"></div>

        <div class="status-chip" id="invite-chip" style="display: none;">
            <div class="indicator"></div>
            <span>Connect: <span class="peer-name" id="peer-username">User</span></span>
        </div>

        <a href="#" class="btn btn-primary" id="btn-open">Open in Glyph Lab</a>
        <a href="https://play.google.com/store/apps/details?id=com.projectkriya.glyphlab" class="btn btn-secondary">Get Glyph Lab App</a>

        <div class="footer">
            Nothing Phone (3) Toy SDK
        </div>
    </div>

    <script>
        // LED Matrix Generator & Waveform Equalizer
        const matrix = document.getElementById('led-matrix');
        const rows = 13;
        const cols = 13;
        const totalDots = rows * cols;
        const dots = [];

        // Generate matrix dots
        for (let i = 0; i < totalDots; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            matrix.appendChild(dot);
            dots.push(dot);
        }

        // Animate a custom waveform
        let time = 0;
        function animateMatrix() {
            time += 0.15;
            for (let c = 0; c < cols; c++) {
                // Calculate height of column using sine waves
                const heightVal = 5 + 4 * Math.sin(time + c * 0.6) + 2 * Math.cos(time * 0.5 - c * 0.3);
                const height = Math.max(1, Math.min(rows, Math.floor(heightVal)));

                for (let r = 0; r < rows; r++) {
                    const idx = r * cols + c;
                    const led = dots[idx];
                    led.className = 'dot'; // reset classes

                    // Turn on LEDs from the bottom up to the calculated height
                    if (r >= (rows - height)) {
                        if (r === (rows - height) && Math.sin(time + c) > 0.4) {
                            // Peak dot is colored Red
                            led.classList.add('active-red');
                        } else {
                            // Body dots are colored White
                            led.classList.add('active');
                        }
                    }
                }
            }
            requestAnimationFrame(animateMatrix);
        }
        
        // Start animation
        animateMatrix();

        // Parse invite parameters
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel_id');
        const peerUsername = urlParams.get('peer_username');
        const peerDeviceId = urlParams.get('peer_device_id');

        const statusMessage = document.getElementById('status-message');
        const inviteChip = document.getElementById('invite-chip');
        const peerNameSpan = document.getElementById('peer-username');
        const btnOpen = document.getElementById('btn-open');

        let appLink = 'glyphlab://walkie/connect';
        if (channelId && peerUsername && peerDeviceId) {
            appLink += `?channel_id=${encodeURIComponent(channelId)}&peer_username=${encodeURIComponent(peerUsername)}&peer_device_id=${encodeURIComponent(peerDeviceId)}`;
            peerNameSpan.textContent = peerUsername;
            inviteChip.style.display = 'inline-flex';
            statusMessage.textContent = 'Join the channel to begin real-time voice memo streaming.';
        } else {
            statusMessage.textContent = 'Open this link on your Nothing Phone to automatically pair.';
        }

        btnOpen.href = appLink;

        // Auto-launch the app on Android
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            setTimeout(() => {
                window.location.href = appLink;
            }, 1200);
        }
    </script>
</body>
</html>
