<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie Talkie by Glyph Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-white: #ffffff;
            --text-muted: #7d7d82;
            --border: #222225;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            /* Nothing OS signature dot grid background */
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 0);
            background-size: 24px 24px;
            color: var(--text-white);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 48px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
            font-family: 'Space Mono', monospace;
            text-transform: none;
            letter-spacing: 0;
            display: block;
            margin-top: 6px;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s ease;
            border-radius: 4px;
        }

        .btn-primary {
            background-color: var(--text-white);
            color: #000000;
            border: 1px solid var(--text-white);
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background-color: #e0e0e0;
            border-color: #e0e0e0;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-white);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: #121214;
            border-color: #3f3f46;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Walkie Talkie<span class="subtitle">by Glyph Lab</span></h1>

        <a href="#" class="btn btn-primary" id="btn-open">Open in Glyph Lab</a>
        <a href="https://play.google.com/store/apps/details?id=com.projectkriya.glyphlab" class="btn btn-secondary">Get Glyph Lab App</a>
    </div>

    <script>
        // Parse invite parameters
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel_id');
        const peerUsername = urlParams.get('peer_username');
        const peerDeviceId = urlParams.get('peer_device_id');

        const btnOpen = document.getElementById('btn-open');

        let appLink = 'glyphlab://walkie/connect';
        if (channelId && peerUsername && peerDeviceId) {
            appLink += `?channel_id=${encodeURIComponent(channelId)}&peer_username=${encodeURIComponent(peerUsername)}&peer_device_id=${encodeURIComponent(peerDeviceId)}`;
        }

        btnOpen.href = appLink;

        // Auto-launch the app on Android
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            setTimeout(() => {
                window.location.href = appLink;
            }, 1000);
        }
    </script>
</body>
</html>
